<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFEDD5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hdr1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="hdr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="hdr3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/>
    </marker>
    <marker id="arrowDown2" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="425" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1F2937">CORTEX × OpenClaw — Architecture</text>

  <!-- ═══ OPENCLAW AGENT BOX ═══ -->
  <g filter="url(#ds)">
    <rect x="30" y="50" width="790" height="185" rx="16" fill="url(#bg1)" stroke="#C7D2FE" stroke-width="1.5"/>
    <rect x="30" y="50" width="790" height="36" rx="16" fill="url(#hdr1)"/>
    <rect x="30" y="70" width="790" height="16" fill="url(#hdr1)"/>
    <text x="425" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="white">🐾  YOUR OPENCLAW AGENT</text>
  </g>

  <!-- Context Engine box -->
  <rect x="55" y="100" width="250" height="120" rx="10" fill="white" stroke="#A5B4FC" stroke-width="1.2"/>
  <text x="180" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">🔌 Context Engine</text>
  <text x="180" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">🔌 Context Engine</text>
  <line x1="70" y1="130" x2="290" y2="130" stroke="#E0E7FF" stroke-width="1"/>
  <text x="75" y="150" font-size="12" fill="#4B5563">INGEST → store every message</text>
  <text x="75" y="168" font-size="12" fill="#4B5563">ASSEMBLE → build smart context</text>
  <text x="75" y="186" font-size="12" fill="#4B5563">COMPACT → sleep/dream cycle</text>
  <text x="75" y="204" font-size="12" fill="#4B5563">EVOLVE → optimize retrieval</text>
  <text x="258" y="150" font-size="10" fill="#8B5CF6">auto</text>
  <text x="258" y="168" font-size="10" fill="#8B5CF6">auto</text>
  <text x="258" y="186" font-size="10" fill="#8B5CF6">auto</text>
  <text x="258" y="204" font-size="10" fill="#8B5CF6">auto</text>

  <!-- Agent Tools box -->
  <rect x="340" y="100" width="220" height="120" rx="10" fill="white" stroke="#A5B4FC" stroke-width="1.2"/>
  <text x="450" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">🛠️ Agent Tools</text>
  <line x1="355" y1="130" x2="545" y2="130" stroke="#E0E7FF" stroke-width="1"/>
  <text x="360" y="149" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_remember</text>
  <text x="360" y="166" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_recall</text>
  <text x="360" y="183" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_gaps</text>
  <text x="490" y="149" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_consolidate</text>
  <text x="490" y="166" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_evolve</text>
  <text x="490" y="183" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_stats</text>
  <text x="360" y="210" font-size="11.5" fill="#4B5563" font-family="'SF Mono', 'Fira Code', monospace">cortex_migrate</text>

  <!-- Prompt Assembler box -->
  <rect x="595" y="100" width="200" height="120" rx="10" fill="white" stroke="#A5B4FC" stroke-width="1.2"/>
  <text x="695" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">🧠 Prompt Assembler</text>
  <line x1="610" y1="130" x2="780" y2="130" stroke="#E0E7FF" stroke-width="1"/>
  <text x="615" y="150" font-size="12" fill="#4B5563">Analyze complexity</text>
  <text x="615" y="168" font-size="12" fill="#4B5563">Select: CoT / ReAct /</text>
  <text x="615" y="186" font-size="12" fill="#4B5563">Few-Shot / Self-Critique</text>
  <text x="615" y="204" font-size="12" fill="#4B5563">Build optimal prompt</text>

  <!-- Arrow: OpenClaw → REST API -->
  <line x1="425" y1="240" x2="425" y2="270" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <rect x="370" y="248" width="110" height="18" rx="4" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="425" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#6366F1">HTTP / REST</text>

  <!-- ═══ REST API BOX ═══ -->
  <g filter="url(#ds)">
    <rect x="140" y="280" width="570" height="75" rx="16" fill="url(#bg2)" stroke="#A7F3D0" stroke-width="1.5"/>
    <rect x="140" y="280" width="570" height="32" rx="16" fill="url(#hdr2)"/>
    <rect x="140" y="296" width="570" height="16" fill="url(#hdr2)"/>
    <text x="425" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="white">📡  CORTEX REST API  —  FastAPI + MCP  (port 8900)</text>
  </g>
  <text x="180" y="340" font-size="12" fill="#374151">/memory/store</text>
  <text x="310" y="340" font-size="12" fill="#374151">/memory/recall</text>
  <text x="440" y="340" font-size="12" fill="#374151">/prompt/assemble</text>
  <text x="590" y="340" font-size="12" fill="#374151">/migrate/*</text>

  <!-- Arrow: REST API → Engine -->
  <line x1="425" y1="360" x2="425" y2="390" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowDown2)"/>

  <!-- ═══ CORTEX ENGINE BOX ═══ -->
  <g filter="url(#ds)">
    <rect x="80" y="400" width="690" height="110" rx="16" fill="url(#bg3)" stroke="#FED7AA" stroke-width="1.5"/>
    <rect x="80" y="400" width="690" height="32" rx="16" fill="url(#hdr3)"/>
    <rect x="80" y="416" width="690" height="16" fill="url(#hdr3)"/>
    <text x="425" y="422" text-anchor="middle" font-size="14" font-weight="700" fill="white">🧠  CORTEX ENGINE  —  Python + SQLite + NumPy</text>
  </g>

  <!-- Memory type pills -->
  <rect x="100" y="445" width="115" height="28" rx="14" fill="#818CF8"/>
  <text x="157" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="white">⚡ Working</text>

  <rect x="225" y="445" width="115" height="28" rx="14" fill="#34D399"/>
  <text x="282" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="white">📅 Episodic</text>

  <rect x="350" y="445" width="115" height="28" rx="14" fill="#60A5FA"/>
  <text x="407" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="white">📚 Semantic</text>

  <rect x="475" y="445" width="120" height="28" rx="14" fill="#FBBF24"/>
  <text x="535" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">🔧 Procedural</text>

  <rect x="605" y="445" width="150" height="28" rx="14" fill="#F472B6"/>
  <text x="680" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="white">🔍 Hippocampal</text>

  <!-- Bottom row pills -->
  <rect x="100" y="482" width="140" height="24" rx="12" fill="#A78BFA"/>
  <text x="170" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="white">😴 Consolidation</text>

  <rect x="250" y="482" width="155" height="24" rx="12" fill="#FB923C"/>
  <text x="327" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="white">📈 Self-Improvement</text>

  <rect x="415" y="482" width="140" height="24" rx="12" fill="#F87171"/>
  <text x="485" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="white">🧬 Self-Evolution</text>

  <rect x="565" y="482" width="150" height="24" rx="12" fill="#2DD4BF"/>
  <text x="640" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="white">🧭 Meta-Cognition</text>

</svg>